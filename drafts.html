<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>草稿管理（样机）</title>
  <style>
    :root{
      --bg:#0b1220; --text:#e9eefc; --muted:#a8b3d6; --line:rgba(255,255,255,.10);
      --r:14px; --shadow: 0 10px 30px rgba(0,0,0,.25);
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family:var(--sans); color:var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, rgba(88,101,242,.26), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(34,197,94,.18), transparent 55%),
                  var(--bg);
    }
    a{ color:#9ad2ff; text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .topbar{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(11,18,32,.70);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:1400px; margin:0 auto;
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; gap:12px;
    }
    .brand{ font-weight:850; }
    .nav{ display:flex; gap:10px; flex-wrap:wrap; }
    .nav a{
      padding:8px 10px; border-radius:10px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:var(--text); font-size:14px;
    }

    .container{ max-width:1200px; margin:0 auto; padding:16px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hd{ padding:12px 14px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .bd{ padding:12px 14px; }
    .muted{ color:var(--muted); }
    .small{ font-size:12px; }

    table{ width:100%; border-collapse:separate; border-spacing:0; border:1px solid rgba(255,255,255,.10); border-radius:12px; overflow:hidden; background:rgba(0,0,0,.10); }
    th,td{ padding:10px; border-bottom:1px solid rgba(255,255,255,.08); font-size:13px; vertical-align:top; }
    th{ background:rgba(255,255,255,.06); font-weight:650; white-space:nowrap; }
    tr:last-child td{ border-bottom:none; }

    .btn{ cursor:pointer; padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:var(--text); font-size:12px; }
    .btn:hover{ background:rgba(255,255,255,.10); }
    .actions{ display:flex; gap:8px; flex-wrap:wrap; }

    .empty{ padding:30px; text-align:center; color:#9aa6c7; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">前沿技术情报与预警平台（样机） <span class="muted small">/ 草稿管理</span></div>
    <div class="nav">
      <a href="index.html">首页工作台</a>
      <a href="info_table.html">情报总表</a>
      <a href="upload_review.html">上传&复核</a>
      <a href="drafts.html">草稿管理</a>
      <a href="excel_import.html">Excel 批量导入</a>
    </div>
  </div>
</div>

<div class="container">
  <section class="card">
    <div class="hd">
      <div style="font-weight:750;">本地草稿列表</div>
      <a class="btn" href="upload_review.html">新建草稿</a>
    </div>
    <div class="bd">
      <div style="overflow:auto;">
        <table>
          <thead>
            <tr>
              <th>标题</th>
              <th>发布时间</th>
              <th>领域</th>
              <th>重要度</th>
              <th>comment</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="draftBody"></tbody>
        </table>
      </div>
      <div id="emptyBox" class="empty" style="display:none;">暂无草稿</div>
    </div>
  </section>
</div>

<script>
  const draftKey = "drafts";
  const $ = s => document.querySelector(s);

  function render(){
    const list = JSON.parse(localStorage.getItem(draftKey) || "[]");
    const tbody = $("#draftBody");
    tbody.innerHTML = "";
    if(list.length === 0){
      $("#emptyBox").style.display = "block";
      return;
    }
    $("#emptyBox").style.display = "none";

    list.forEach(draft => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${draft.title || "-"}</td>
        <td>${draft.published_at || "-"}</td>
        <td>${(draft.domain_ids || []).join("、") || "-"}</td>
        <td>${draft.importance_score || "-"}</td>
        <td>${draft.comment ? "有" : "无"}</td>
        <td>
          <div class="actions">
            <button class="btn" data-continue>继续提交 AI</button>
            <button class="btn" data-delete>删除</button>
          </div>
        </td>
      `;

      tr.querySelector("[data-continue]").addEventListener("click", () => {
        localStorage.setItem("currentDraft", JSON.stringify(draft));
        location.href = "upload_review.html";
      });

      tr.querySelector("[data-delete]").addEventListener("click", () => {
        const filtered = list.filter(item => item.id !== draft.id);
        localStorage.setItem(draftKey, JSON.stringify(filtered));
        render();
      });

      tbody.appendChild(tr);
    });
  }

  render();
</script>
</body>
</html>
