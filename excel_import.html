<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Excel 批量导入（样机）</title>
  <style>
    :root{
      --bg:#0b1220; --text:#e9eefc; --muted:#a8b3d6; --line:rgba(255,255,255,.10);
      --r:14px; --shadow: 0 10px 30px rgba(0,0,0,.25);
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family:var(--sans); color:var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, rgba(88,101,242,.26), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(34,197,94,.18), transparent 55%),
                  var(--bg);
    }
    a{ color:#9ad2ff; text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .topbar{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(11,18,32,.70);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:1400px; margin:0 auto;
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; gap:12px;
    }
    .brand{ font-weight:850; }
    .nav{ display:flex; gap:10px; flex-wrap:wrap; }
    .nav a{
      padding:8px 10px; border-radius:10px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:var(--text); font-size:14px;
    }

    .container{ max-width:1200px; margin:0 auto; padding:16px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hd{ padding:12px 14px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .bd{ padding:12px 14px; }
    .muted{ color:var(--muted); }
    .small{ font-size:12px; }

    input[type="file"]{
      width:100%;
      background:rgba(15,23,48,.9);
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
      padding:10px;
      border-radius:12px;
      font-size:13px;
      outline:none;
    }

    table{ width:100%; border-collapse:separate; border-spacing:0; border:1px solid rgba(255,255,255,.10); border-radius:12px; overflow:hidden; background:rgba(0,0,0,.10); }
    th,td{ padding:10px; border-bottom:1px solid rgba(255,255,255,.08); font-size:12px; vertical-align:top; }
    th{ background:rgba(255,255,255,.06); font-weight:650; white-space:nowrap; }
    tr:last-child td{ border-bottom:none; }

    .btn{ cursor:pointer; padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:var(--text); font-size:12px; }
    .btn:hover{ background:rgba(255,255,255,.10); }

    .error{ color:#fca5a5; }
    .success{ color:#a7f3d0; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">前沿技术情报与预警平台（样机） <span class="muted small">/ Excel 批量导入</span></div>
    <div class="nav">
      <a href="index.html">首页工作台</a>
      <a href="info_table.html">情报总表</a>
      <a href="upload_review.html">上传&复核</a>
      <a href="drafts.html">草稿管理</a>
      <a href="excel_import.html">Excel 批量导入</a>
    </div>
  </div>
</div>

<div class="container">
  <section class="card">
    <div class="hd">
      <div style="font-weight:750;">上传 Excel / CSV</div>
      <div style="display:flex; gap:8px; flex-wrap:wrap;">
        <a class="btn" href="data/draft_template.csv" download>下载草稿模板</a>
        <a class="btn" href="data/upload_template.csv" download>下载批量上传模板</a>
        <a class="btn" href="data/draft_upload_guide.csv" download>下载CSV说明模板</a>
      </div>
    </div>
    <div class="bd">
      <input type="file" id="fileInput" accept=".csv,.xlsx" />
      <div class="muted small" style="margin-top:8px;">支持 CSV 和 Excel `.xlsx`。</div>

      <div id="status" style="margin-top:10px;"></div>

      <div style="overflow:auto; margin-top:12px;">
        <table>
          <thead>
            <tr>
              <th>标题</th>
              <th>发布时间</th>
              <th>领域</th>
              <th>重要度</th>
              <th>预警手动</th>
              <th>校验</th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>

      <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="btnCommitDraft">批量生成草稿</button>
        <button class="btn" id="btnCommitPublish">批量发布（跳过草稿）</button>
        <a class="btn" href="drafts.html">进入草稿管理</a>
      </div>
    </div>
  </section>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script>
  const $ = s => document.querySelector(s);
  const API_BASE = window.API_BASE || "http://127.0.0.1:8000/api";

  async function loadApi(path, options = {}){
    const r = await fetch(`${API_BASE}${path}`, {
      cache: "no-store",
      ...options
    });
    if(!r.ok){
      const text = await r.text();
      throw new Error(`API请求失败 (${r.status}) ${text}`);
    }
    if(r.status === 204) return null;
    return await r.json();
  }

  function parseCSV(text){
    const rows = [];
    let row = [];
    let cell = "";
    let inQuotes = false;

    for(let i = 0; i < text.length; i++){
      const ch = text[i];
      const next = text[i + 1];
      if(ch === '"'){
        if(inQuotes && next === '"'){
          cell += '"';
          i++;
        }else{
          inQuotes = !inQuotes;
        }
        continue;
      }
      if(ch === "," && !inQuotes){
        row.push(cell);
        cell = "";
        continue;
      }
      if((ch === "\n" || ch === "\r") && !inQuotes){
        if(ch === "\r" && next === "\n") i++;
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
        continue;
      }
      cell += ch;
    }

    if(cell.length || row.length){
      row.push(cell);
      rows.push(row);
    }

    if(rows.length === 0) return [];
    const header = rows[0].map(x => (x || "").trim());
    return rows.slice(1).filter(cells => cells.some(v => (v || "").trim())).map(cells => {
      const obj = {};
      header.forEach((key, idx) => {
        obj[key] = (cells[idx] || "").trim();
      });
      return obj;
    });
  }

  function textLooksCorrupted(text){
    return text.includes("�");
  }

  async function readCsvText(file){
    const buf = await file.arrayBuffer();
    let text = new TextDecoder("utf-8").decode(buf);
    if(textLooksCorrupted(text)){
      try{
        text = new TextDecoder("gb18030").decode(buf);
      }catch{
      }
    }
    return text;
  }

  function pad2(n){
    return String(n).padStart(2, "0");
  }

  function normalizeDateValue(value){
    if(value instanceof Date && Number.isFinite(value.getTime())){
      const y = value.getFullYear();
      const m = pad2(value.getMonth() + 1);
      const d = pad2(value.getDate());
      return `${y}-${m}-${d}`;
    }
    const raw = String(value ?? "").trim();
    if(!raw) return "";

    if(/^\d{4}[-/.]\d{1,2}[-/.]\d{1,2}$/.test(raw)){
      const [y, m, d] = raw.split(/[-/.]/).map(Number);
      return `${y}-${pad2(m)}-${pad2(d)}`;
    }

    if(/^\d+(\.\d+)?$/.test(raw)){
      const serial = Number(raw);
      if(Number.isFinite(serial) && serial > 20000 && serial < 90000){
        const utc = new Date(Math.round((serial - 25569) * 86400 * 1000));
        const y = utc.getUTCFullYear();
        const m = pad2(utc.getUTCMonth() + 1);
        const d = pad2(utc.getUTCDate());
        return `${y}-${m}-${d}`;
      }
    }

    return raw;
  }

  function normalizeRow(rawRow){
    const row = { ...rawRow };
    row.published_at = normalizeDateValue(row.published_at);
    return row;
  }

  async function readXlsxRows(file){
    const buf = await file.arrayBuffer();
    const wb = XLSX.read(buf, { type: "array", cellDates: true });
    const sheetName = wb.SheetNames[0];
    if(!sheetName){
      return [];
    }
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[sheetName], { defval: "", raw: false, dateNF: "yyyy-mm-dd" });
    return rows.map(row => {
      const normalized = {};
      Object.keys(row).forEach(key => {
        const rawValue = row[key];
        normalized[String(key).trim()] = rawValue instanceof Date ? normalizeDateValue(rawValue) : String(rawValue ?? "").trim();
      });
      return normalizeRow(normalized);
    });
  }

  function normalizeClassification(v){
    const val = (v || "").trim();
    if(!val) return "内部";
    const lower = val.toLowerCase();
    if(lower === "public") return "公开";
    if(lower === "internal") return "内部";
    if(lower === "secret") return "秘密";
    if(lower === "top_secret") return "机密";
    return val;
  }

  function parseBool(v){
    const val = String(v).trim().toLowerCase();
    return val === "true" || val === "1" || val === "yes" || val === "y" || val === "是";
  }

  function parseList(v){
    return String(v || "").split(/[;；,，]/).map(s => s.trim()).filter(Boolean);
  }

  function durationToExpiresAt(duration){
    const now = new Date();
    if(duration === "week"){
      now.setDate(now.getDate() + 7);
    }else if(duration === "month"){
      now.setMonth(now.getMonth() + 1);
    }else if(duration === "quarter"){
      now.setMonth(now.getMonth() + 3);
    }else{
      return null;
    }
    return now.toISOString();
  }

  function extractIndicators(row){
    const indicators = [];
    for(let i = 1; i <= 20; i++){
      const name = (row[`indicator_${i}_name`] || "").trim();
      const value = (row[`indicator_${i}_value`] || "").trim();
      const unit = (row[`indicator_${i}_unit`] || "").trim();
      if(!name && !value && !unit) continue;
      indicators.push({ name, value, unit, keep: true });
    }
    return indicators;
  }

  function validate(row, mode){
    const required = mode === "publish"
      ? ["title", "content", "domains"]
      : ["title", "content", "domains"];
    const missing = required.filter(key => !row[key]);
    if(missing.length){
      return `缺少字段：${missing.join("、")}`;
    }
    const importance = Number(row.importance_score || 3);
    if(!Number.isFinite(importance) || importance < 1 || importance > 5){
      return "importance_score 必须是 1-5";
    }
    if(parseBool(row.alert_manual)){
      const alertRequired = ["alert_title", "alert_body", "reviewer_comment", "duration", "alert_color"];
      const missingAlert = alertRequired.filter(key => !row[key]);
      if(missingAlert.length){
        return `预警缺失：${missingAlert.join("、")}`;
      }
    }
    if(mode === "publish" && parseList(row.domains).length === 0){
      return "发布模式下 domains 至少要有一个领域";
    }
    return "";
  }

  function toDraft(row){
    return {
      title: row.title,
      published_at: row.published_at,
      source_url: row.source_url,
      source_types: parseList(row.source_types),
      info_types: parseList(row.info_types),
      domain_ids: parseList(row.domains),
      importance_score: Number(row.importance_score || 3),
      is_new_tech: parseBool(row.is_new_tech),
      content: row.content,
      tags: parseList(row.tags),
      classification: normalizeClassification(row.classification),
      comment: row.comment || "",
      alert_manual: parseBool(row.alert_manual),
      alert_title: row.alert_title || "",
      alert_body: row.alert_body || "",
      reviewer_comment: row.reviewer_comment || "",
      duration: row.duration || "month",
      alert_color: row.alert_color || "orange",
      indicators: extractIndicators(row),
      status: "draft"
    };
  }

  async function createDraftRow(row){
    const draft = toDraft(row);
    await loadApi("/info-items/draft", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title: draft.title,
        content: draft.content,
        source_url: draft.source_url || null,
        published_at: draft.published_at ? `${draft.published_at}T00:00:00Z` : null,
        importance_score: draft.importance_score,
        is_new_tech: draft.is_new_tech,
        comment: draft.comment || null,
        source_types: draft.source_types,
        info_types: draft.info_types,
        tags: draft.tags,
        domain_ids: draft.domain_ids,
        classification: draft.classification || null,
        status: "draft",
        draft_data: {
          indicators: draft.indicators || [],
          duration: draft.duration || "month",
          manual_alert: !!draft.alert_manual
        },
        alert: draft.alert_manual ? {
          enabled: true,
          alert_title: draft.alert_title || "",
          alert_body: draft.alert_body || "",
          reviewer_comment: draft.reviewer_comment || "",
          alert_color: draft.alert_color || "orange",
          expires_at: durationToExpiresAt(draft.duration || "month")
        } : null
      })
    });
  }

  async function publishRow(row){
    return await loadApi("/info-items/publish", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        title: row.title,
        content: row.content,
        source_url: row.source_url || null,
        published_at: row.published_at ? `${row.published_at}T00:00:00Z` : null,
        importance_score: Number(row.importance_score || 3),
        is_new_tech: parseBool(row.is_new_tech),
        comment: row.comment || null,
        source_types: parseList(row.source_types),
        info_types: parseList(row.info_types),
        tags: parseList(row.tags),
        domain_ids: parseList(row.domains),
        classification: normalizeClassification(row.classification),
        alert: parseBool(row.alert_manual) ? {
          enabled: true,
          alert_title: row.alert_title || "",
          alert_body: row.alert_body || "",
          reviewer_comment: row.reviewer_comment || "",
          alert_color: row.alert_color || "orange",
          expires_at: durationToExpiresAt(row.duration || "month")
        } : null
      })
    });
  }

  let previewRows = [];

  $("#fileInput").addEventListener("change", async (e) => {
    const file = e.target.files[0];
    if(!file) return;
    try{
      const ext = (file.name.split(".").pop() || "").toLowerCase();
      if(ext === "xlsx"){
        previewRows = await readXlsxRows(file);
      }else{
        const text = await readCsvText(file);
        previewRows = parseCSV(text).map(normalizeRow);
      }
      renderPreview();
    }catch(err){
      $("#status").textContent = `读取文件失败：${err.message || err}`;
      $("#status").className = "error";
    }
  });

  function renderPreview(){
    const tbody = $("#previewBody");
    tbody.innerHTML = "";
    if(previewRows.length === 0){
      $("#status").textContent = "";
      return;
    }

    let errorCount = 0;
    previewRows.forEach(row => {
      const error = validate(row, "draft");
      if(error) errorCount++;
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.title || "-"}</td>
        <td>${row.published_at || "-"}</td>
        <td>${row.domains || "-"}</td>
        <td>${row.importance_score || "-"}</td>
        <td>${row.alert_manual || "false"}</td>
        <td class="${error ? "error" : "success"}">${error || "通过"}</td>
      `;
      tbody.appendChild(tr);
    });

    $("#status").textContent = errorCount ? `发现 ${errorCount} 行错误，需修正后再提交。` : "校验通过，可批量生成草稿或直接发布。";
    $("#status").className = errorCount ? "error" : "success";
  }

  $("#btnCommitDraft").addEventListener("click", async () => {
    if(previewRows.length === 0){
      alert("请先上传 CSV/XLSX 文件");
      return;
    }
    const invalid = previewRows.find(row => validate(row, "draft"));
    if(invalid){
      alert("存在校验错误，无法提交。");
      return;
    }
    let ok = 0;
    let fail = 0;
    const errors = [];
    for(const row of previewRows){
      try{
        await createDraftRow(row);
        ok++;
      }catch(err){
        fail++;
        if(errors.length < 3){
          errors.push(err?.message || "未知错误");
        }
      }
    }
    if(fail){
      alert(`批量生成草稿完成：成功 ${ok} 条，失败 ${fail} 条。\n${errors.join("\n")}`);
    }else{
      alert(`已批量生成草稿，共 ${ok} 条。`);
    }
  });

  $("#btnCommitPublish").addEventListener("click", async () => {
    if(previewRows.length === 0){
      alert("请先上传 CSV/XLSX 文件");
      return;
    }
    const invalid = previewRows.find(row => validate(row, "publish"));
    if(invalid){
      alert("存在校验错误，无法批量发布。");
      return;
    }
    let ok = 0;
    let fail = 0;
    const errors = [];
    for(const row of previewRows){
      try{
        await publishRow(row);
        ok++;
      }catch(err){
        fail++;
        if(errors.length < 3){
          errors.push(err?.message || "未知错误");
        }
      }
    }
    if(fail){
      alert(`批量发布完成：成功 ${ok} 条，失败 ${fail} 条。\n${errors.join("\n")}`);
    }else{
      alert(`批量发布成功，共 ${ok} 条。`);
    }
  });
</script>

</body>
</html>
