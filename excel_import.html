<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Excel 批量导入（样机）</title>
  <style>
    :root{
      --bg:#0b1220; --text:#e9eefc; --muted:#a8b3d6; --line:rgba(255,255,255,.10);
      --r:14px; --shadow: 0 10px 30px rgba(0,0,0,.25);
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family:var(--sans); color:var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, rgba(88,101,242,.26), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(34,197,94,.18), transparent 55%),
                  var(--bg);
    }
    a{ color:#9ad2ff; text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .topbar{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(11,18,32,.70);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:1400px; margin:0 auto;
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; gap:12px;
    }
    .brand{ font-weight:850; }
    .nav{ display:flex; gap:10px; flex-wrap:wrap; }
    .nav a{
      padding:8px 10px; border-radius:10px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:var(--text); font-size:14px;
    }

    .container{ max-width:1200px; margin:0 auto; padding:16px; }
    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hd{ padding:12px 14px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .bd{ padding:12px 14px; }
    .muted{ color:var(--muted); }
    .small{ font-size:12px; }

    input[type="file"]{
      width:100%;
      background:rgba(15,23,48,.9);
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
      padding:10px;
      border-radius:12px;
      font-size:13px;
      outline:none;
    }

    table{ width:100%; border-collapse:separate; border-spacing:0; border:1px solid rgba(255,255,255,.10); border-radius:12px; overflow:hidden; background:rgba(0,0,0,.10); }
    th,td{ padding:10px; border-bottom:1px solid rgba(255,255,255,.08); font-size:12px; vertical-align:top; }
    th{ background:rgba(255,255,255,.06); font-weight:650; white-space:nowrap; }
    tr:last-child td{ border-bottom:none; }

    .btn{ cursor:pointer; padding:8px 10px; border-radius:10px; border:1px solid rgba(255,255,255,.12); background:rgba(255,255,255,.06); color:var(--text); font-size:12px; }
    .btn:hover{ background:rgba(255,255,255,.10); }

    .error{ color:#fca5a5; }
    .success{ color:#a7f3d0; }
  </style>
</head>
<body>
<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">前沿技术情报与预警平台（样机） <span class="muted small">/ Excel 批量导入</span></div>
    <div class="nav">
      <a href="index.html">首页工作台</a>
      <a href="info_table.html">情报总表</a>
      <a href="upload_review.html">上传&复核</a>
      <a href="drafts.html">草稿管理</a>
      <a href="excel_import.html">Excel 批量导入</a>
    </div>
  </div>
</div>

<div class="container">
  <section class="card">
    <div class="hd">
      <div style="font-weight:750;">上传 Excel / CSV</div>
      <a class="btn" href="data/import_template.csv" download>下载模板（CSV）</a>
    </div>
    <div class="bd">
      <input type="file" id="fileInput" accept=".csv" />
      <div class="muted small" style="margin-top:8px;">样机支持 CSV（可用 Excel 打开/保存）。</div>

      <div id="status" style="margin-top:10px;"></div>

      <div style="overflow:auto; margin-top:12px;">
        <table>
          <thead>
            <tr>
              <th>标题</th>
              <th>发布时间</th>
              <th>领域</th>
              <th>重要度</th>
              <th>预警手动</th>
              <th>校验</th>
            </tr>
          </thead>
          <tbody id="previewBody"></tbody>
        </table>
      </div>

      <div style="margin-top:12px; display:flex; gap:10px; flex-wrap:wrap;">
        <button class="btn" id="btnCommit">批量生成草稿</button>
        <a class="btn" href="drafts.html">进入草稿管理</a>
      </div>
    </div>
  </section>
</div>

<script>
  const $ = s => document.querySelector(s);
  const draftKey = "drafts";

  function parseCSV(text){
    const lines = text.trim().split(/\r?\n/);
    const header = lines.shift().split(",");
    return lines.map(line => {
      const cells = line.match(/("[^"]*"|[^,]+)/g) || [];
      const obj = {};
      header.forEach((key, idx) => {
        const raw = (cells[idx] || "").replace(/^"|"$/g, "");
        obj[key] = raw;
      });
      return obj;
    });
  }

  function validate(row){
    const required = ["title", "published_at", "source_url", "source_types", "info_types", "domains", "importance_score", "is_new_tech", "content"];
    const missing = required.filter(key => !row[key]);
    if(missing.length){
      return `缺少字段：${missing.join("、")}`;
    }
    if(row.alert_manual === "true"){
      const alertRequired = ["alert_title", "alert_body", "reviewer_comment", "duration"];
      const missingAlert = alertRequired.filter(key => !row[key]);
      if(missingAlert.length){
        return `预警缺失：${missingAlert.join("、")}`;
      }
    }
    return "";
  }

  function toDraft(row){
    return {
      id: `DRAFT_${Date.now()}_${Math.random().toString(16).slice(2,6)}`,
      title: row.title,
      published_at: row.published_at,
      source_url: row.source_url,
      source_types: row.source_types.split(";").map(s => s.trim()).filter(Boolean),
      info_types: row.info_types.split(";").map(s => s.trim()).filter(Boolean),
      domain_ids: row.domains.split(";").map(s => s.trim()).filter(Boolean),
      importance_score: Number(row.importance_score || 3),
      is_new_tech: row.is_new_tech === "true",
      content: row.content,
      tags: row.tags ? row.tags.split(";").map(s => s.trim()).filter(Boolean) : [],
      classification: row.classification || "internal",
      comment: row.comment || "",
      alert_manual: row.alert_manual === "true",
      alert_title: row.alert_title || "",
      alert_body: row.alert_body || "",
      reviewer_comment: row.reviewer_comment || "",
      duration: row.duration || "month",
      status: "draft"
    };
  }

  let previewRows = [];

  $("#fileInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      previewRows = parseCSV(reader.result);
      renderPreview();
    };
    reader.readAsText(file);
  });

  function renderPreview(){
    const tbody = $("#previewBody");
    tbody.innerHTML = "";
    if(previewRows.length === 0){
      $("#status").textContent = "";
      return;
    }

    let errorCount = 0;
    previewRows.forEach(row => {
      const error = validate(row);
      if(error) errorCount++;
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${row.title || "-"}</td>
        <td>${row.published_at || "-"}</td>
        <td>${row.domains || "-"}</td>
        <td>${row.importance_score || "-"}</td>
        <td>${row.alert_manual || "false"}</td>
        <td class="${error ? "error" : "success"}">${error || "通过"}</td>
      `;
      tbody.appendChild(tr);
    });

    $("#status").textContent = errorCount ? `发现 ${errorCount} 行错误，需修正后再提交。` : "校验通过，可批量生成草稿。";
    $("#status").className = errorCount ? "error" : "success";
  }

  $("#btnCommit").addEventListener("click", () => {
    if(previewRows.length === 0){
      alert("请先上传 CSV 文件");
      return;
    }
    const invalid = previewRows.find(row => validate(row));
    if(invalid){
      alert("存在校验错误，无法提交。");
      return;
    }
    const list = JSON.parse(localStorage.getItem(draftKey) || "[]");
    previewRows.forEach(row => list.unshift(toDraft(row)));
    localStorage.setItem(draftKey, JSON.stringify(list));
    alert("已批量生成草稿");
  });
</script>
</body>
</html>
