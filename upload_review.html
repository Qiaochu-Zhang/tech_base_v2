<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>上传&复核（样机）</title>
  <style>
    :root{
      --bg:#0b1220; --text:#e9eefc; --muted:#a8b3d6; --line:rgba(255,255,255,.10);
      --r:14px; --shadow: 0 10px 30px rgba(0,0,0,.25);
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0; font-family:var(--sans); color:var(--text);
      background: radial-gradient(1200px 700px at 20% -10%, rgba(88,101,242,.26), transparent 60%),
                  radial-gradient(900px 600px at 90% 10%, rgba(34,197,94,.18), transparent 55%),
                  var(--bg);
    }
    a{ color:#9ad2ff; text-decoration:none; }
    a:hover{ text-decoration:underline; }

    .topbar{
      position:sticky; top:0; z-index:20;
      backdrop-filter: blur(10px);
      background: rgba(11,18,32,.70);
      border-bottom:1px solid var(--line);
    }
    .topbar-inner{
      max-width:1400px; margin:0 auto;
      display:flex; align-items:center; justify-content:space-between;
      padding:12px 16px; gap:12px;
    }
    .brand{ font-weight:850; }
    .nav{ display:flex; gap:10px; flex-wrap:wrap; }
    .nav a{
      padding:8px 10px; border-radius:10px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.07);
      color:var(--text); font-size:14px;
    }

    .container{ max-width:1400px; margin:0 auto; padding:16px; }
    .grid{ display:grid; grid-template-columns: 1fr 420px; gap:14px; }
    @media (max-width: 1080px){ .grid{ grid-template-columns: 1fr; } }

    .card{
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid var(--line);
      border-radius: var(--r);
      box-shadow: var(--shadow);
      overflow:hidden;
    }
    .hd{ padding:12px 14px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; gap:10px; align-items:center; }
    .bd{ padding:12px 14px; }
    .muted{ color:var(--muted); }
    .small{ font-size:12px; }
    .mono{ font-family:var(--mono); }

    label{ display:block; margin:10px 0 6px; color:var(--muted); font-size:12px; }
    input, select, textarea{
      width:100%;
      background:rgba(15,23,48,.9);
      border:1px solid rgba(255,255,255,.12);
      color:var(--text);
      padding:10px;
      border-radius:12px;
      font-size:13px;
      outline:none;
    }
    textarea{ min-height:180px; resize:vertical; }
    input[type="date"]{ padding:9px 10px; }
    .row{ display:flex; gap:10px; }
    .row > *{ flex:1; }

    .btn{
      cursor:pointer;
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:var(--text);
      font-size:13px;
      width:100%;
    }
    .btn:hover{ background:rgba(255,255,255,.10); }
    .btn.primary{ background:rgba(88,101,242,.25); border-color:rgba(88,101,242,.35); }
    .btn.danger{ background:rgba(248,113,113,.15); border-color:rgba(248,113,113,.25); }
    .btn:disabled{ opacity:.5; cursor:not-allowed; }

    .pill{
      display:inline-flex; align-items:center; gap:8px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);
      padding:6px 10px;
      border-radius:999px;
      font-size:12px;
      white-space:nowrap;
    }
    .dot{ width:8px; height:8px; border-radius:999px; background:#aaa; }
    .dot.yellow{ background:#facc15; }
    .dot.orange{ background:#fb923c; }
    .dot.red{ background:#f87171; }

    .hint{ border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.10); padding:10px 12px; border-radius:12px; line-height:1.6; }
    .warn{ border:1px solid rgba(248,113,113,.30); background:rgba(248,113,113,.08); padding:10px 12px; border-radius:12px; display:none; margin-bottom:12px; }

    .chips{ display:flex; flex-wrap:wrap; gap:8px; margin-top:8px; }
    .chip{ background:rgba(255,255,255,.06); border:1px solid rgba(255,255,255,.08); border-radius:999px; padding:6px 10px; font-size:12px; cursor:pointer; user-select:none; }
    .chip.on{ background:rgba(154,210,255,.15); border-color:rgba(154,210,255,.25); }
    .chip:hover{ background:rgba(255,255,255,.10); }

    table{ width:100%; border-collapse:separate; border-spacing:0; border:1px solid rgba(255,255,255,.10); border-radius:12px; overflow:hidden; background:rgba(0,0,0,.10); }
    th,td{ padding:10px; border-bottom:1px solid rgba(255,255,255,.08); font-size:13px; vertical-align:top; }
    th{ background:rgba(255,255,255,.06); font-weight:650; white-space:nowrap; }
    tr:last-child td{ border-bottom:none; }

    .modal{ position:fixed; inset:0; background:rgba(0,0,0,.55); display:none; align-items:center; justify-content:center; z-index:50; padding:16px; }
    .modal .box{ width:min(720px, 100%); background:rgba(11,18,32,.96); border:1px solid rgba(255,255,255,.12); border-radius:16px; box-shadow: var(--shadow); overflow:hidden; }
    .modal .box .hd{ border-bottom:1px solid rgba(255,255,255,.10); }
    .modal .box .bd{ padding:14px; }

    .tree{ border:1px solid rgba(255,255,255,.10); background:rgba(0,0,0,.10); border-radius:12px; padding:8px; max-height: 260px; overflow:auto; }
    .tree-row{ display:flex; align-items:center; gap:8px; padding:6px 8px; border-radius:10px; }
    .tree-row:hover{ background:rgba(255,255,255,.06); }
    .tree-toggle{ width:22px; height:22px; display:inline-flex; align-items:center; justify-content:center; border:1px solid rgba(255,255,255,.12); border-radius:8px; background:rgba(255,255,255,.05); cursor:pointer; user-select:none; font-family: var(--mono); font-size:12px; }
    .tree-toggle.empty{ opacity:.25; cursor:default; }
    .tree-node{ cursor:pointer; user-select:none; flex:1; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .tree-indent{ width: 16px; flex: 0 0 16px; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <div class="brand">前沿技术情报与预警平台（样机） <span class="muted small">/ 上传 & 复核</span></div>
    <div class="nav">
      <a href="index.html">首页工作台</a>
      <a href="info_table.html">情报总表</a>
      <a href="upload_review.html">上传&复核</a>
      <a href="drafts.html">草稿管理</a>
      <a href="excel_import.html">Excel 批量导入</a>
    </div>
  </div>
</div>

<div class="container">
  <div class="grid">
    <section class="card">
      <div class="hd">
        <div style="font-weight:850;">上传 / 编辑情报（草稿）</div>
        <div class="pill">先填全字段 → 提交 → AI 推荐 → 人工修正 → 预览 → 发布</div>
      </div>
      <div class="bd">
        <div id="warnBox" class="warn"></div>
        <label>标题</label>
        <input id="title" placeholder="填写情报标题" />

        <div class="row">
          <div>
            <label>发布时间</label>
            <input id="published_at" type="date" />
          </div>
          <div>
            <label>重要度（1-5）</label>
            <select id="importance_score">
              <option value="5">5</option>
              <option value="4" selected>4</option>
              <option value="3">3</option>
              <option value="2">2</option>
              <option value="1">1</option>
            </select>
          </div>
        </div>

        <label>情报正文（放在 tags 上面）</label>
        <textarea id="content" placeholder="正文内容"></textarea>

        <label>来源链接</label>
        <input id="source_url" placeholder="https://..." />

        <label>情报来源（多选）</label>
        <div class="chips" id="sourceChips"></div>

        <label>情报类型（多选）</label>
        <div class="chips" id="typeChips"></div>

        <label>领域（多选）</label>
        <div class="tree" id="domainTree"></div>

        <label>标签 tags（逗号分隔）</label>
        <input id="tags" placeholder="固体吸附, 低湿烟气" />

        <label>情报 comment（上传前）</label>
        <input id="comment" placeholder="上传者研判 / 备注" />

        <label>是否新技术</label>
        <select id="is_new_tech">
          <option value="true">新技术（可能触发预警）</option>
          <option value="false">已有技术</option>
        </select>

        <div class="row" style="margin-top:12px;">
          <button class="btn" id="btnSaveDraft">保存草稿（本地）</button>
          <button class="btn primary" id="btnSubmit">提交并生成 AI 建议</button>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="hd">
        <div style="font-weight:850;">上传说明</div>
      </div>
      <div class="bd">
        <div class="hint">
          ① 填写全部字段后才能触发 AI 推荐。<br/>
          ② AI 仅提供指标候选与预警建议，最终以人工确认结果为准。<br/>
          ③ 若预警为 active，必须补齐预警标题、内容、reviewer_comment、duration。
        </div>
        <div class="row" style="margin-top:12px;">
          <a class="btn" href="drafts.html">查看草稿管理</a>
          <a class="btn" href="excel_import.html">Excel 批量导入</a>
        </div>
      </div>
    </section>
  </div>

  <section class="card" id="aiPanel" style="margin-top:14px; display:none;">
    <div class="hd">
      <div style="font-weight:850;">AI 推荐指标 & 预警建议</div>
      <div class="muted small">提交后才会出现</div>
    </div>
    <div class="bd">
      <div class="row">
        <div class="pill"><span class="dot orange"></span><span id="aiAlertText">AI 预警建议：-</span></div>
        <div class="pill">建议原因：<span id="aiAlertReason">-</span></div>
      </div>

      <label style="margin-top:12px;">指标候选（可修改数值 / 单位）</label>
      <table>
        <thead>
          <tr>
            <th>指标</th>
            <th>建议值</th>
            <th>单位</th>
            <th>保留</th>
          </tr>
        </thead>
        <tbody id="indicatorBody"></tbody>
      </table>

      <div class="row" style="margin-top:10px;">
        <button class="btn" id="btnAddIndicator">新增指标</button>
        <button class="btn" id="btnToggleAlert">强制开启预警</button>
      </div>

      <label style="margin-top:14px;">预警信息（若触发必须补齐）</label>
      <div class="row">
        <div>
          <label>预警标题 alert_title（必填）</label>
          <input id="alert_title" placeholder="填写预警标题" />
        </div>
        <div>
          <label>预警时效 duration</label>
          <select id="duration">
            <option value="week">一周</option>
            <option value="month" selected>一月</option>
            <option value="quarter">一季度</option>
          </select>
        </div>
      </div>
      <label>预警内容 alert_body（必填）</label>
      <input id="alert_body" placeholder="填写预警内容" />
      <label>reviewer_comment（必填）</label>
      <input id="reviewer_comment" placeholder="复核意见" />

      <div class="row" style="margin-top:12px;">
        <button class="btn" id="btnPreview">预览</button>
        <button class="btn primary" id="btnPublish">发布</button>
      </div>
    </div>
  </section>
</div>

<div class="modal" id="previewModal">
  <div class="box">
    <div class="hd">
      <div style="font-weight:750;">发布预览</div>
      <button class="btn" id="btnClosePreview">关闭</button>
    </div>
    <div class="bd" id="previewBody"></div>
  </div>
</div>

<script type="module">
  const $ = s => document.querySelector(s);
  const draftKey = "drafts";

  const escapeHtml = str => str.replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));

  async function loadJson(p){
    const r = await fetch(p, { cache: "no-store" });
    return await r.json();
  }

  const state = {
    domains: [],
    indicators: [],
    aiShouldAlert: false,
    aiReasons: [],
    manualAlert: false
  };

  function showWarn(msg){
    const box = $("#warnBox");
    box.textContent = msg;
    box.style.display = "block";
  }

  function clearWarn(){
    const box = $("#warnBox");
    box.textContent = "";
    box.style.display = "none";
  }

  function createChips(containerId, values){
    const box = document.getElementById(containerId);
    box.innerHTML = "";
    values.forEach(val => {
      const chip = document.createElement("div");
      chip.className = "chip";
      chip.dataset.value = val;
      chip.textContent = val;
      chip.addEventListener("click", () => chip.classList.toggle("on"));
      box.appendChild(chip);
    });
  }

  function collectChipValues(containerId){
    return Array.from(document.querySelectorAll(`#${containerId} .chip.on`)).map(ch => ch.dataset.value);
  }

  function buildTree(domains, container){
    const map = Object.fromEntries(domains.map(d => [d.id, {...d, children: []}]));
    const roots = [];
    domains.forEach(d => {
      if(d.parent_id && map[d.parent_id]){
        map[d.parent_id].children.push(map[d.id]);
      } else {
        roots.push(map[d.id]);
      }
    });

    const expanded = new Set(roots.map(r => r.id));

    function render(){
      container.innerHTML = "";
      if(roots.length === 0){
        container.innerHTML = "<div class=\"muted small\">暂无领域数据</div>";
        return;
      }
      const renderNode = (node, depth) => {
        const row = document.createElement("div");
        row.className = "tree-row";

        for(let i=0;i<depth;i++){
          const indent = document.createElement("div");
          indent.className = "tree-indent";
          row.appendChild(indent);
        }

        const toggle = document.createElement("div");
        const expandable = node.children.length > 0;
        toggle.className = "tree-toggle" + (expandable ? "" : " empty");
        toggle.textContent = expandable ? (expanded.has(node.id) ? "−" : "+") : "·";
        if(expandable){
          toggle.addEventListener("click", (e)=>{
            e.stopPropagation();
            expanded.has(node.id) ? expanded.delete(node.id) : expanded.add(node.id);
            render();
          });
        }
        row.appendChild(toggle);

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = node.id;
        checkbox.style.margin = "0 6px 0 0";
        row.appendChild(checkbox);

        const nodeLabel = document.createElement("div");
        nodeLabel.className = "tree-node";
        nodeLabel.textContent = node.name;
        nodeLabel.addEventListener("click", () => {
          checkbox.checked = !checkbox.checked;
        });
        row.appendChild(nodeLabel);

        container.appendChild(row);

        if(expanded.has(node.id)){
          node.children.forEach(child => renderNode(child, depth + 1));
        }
      };

      roots.forEach(root => renderNode(root, 0));
    }

    render();
  }

  function getSelectedDomains(){
    return Array.from(document.querySelectorAll("#domainTree input[type='checkbox']:checked")).map(i => i.value);
  }

  function getForm(){
    return {
      title: $("#title").value.trim(),
      published_at: $("#published_at").value,
      content: $("#content").value.trim(),
      source_url: $("#source_url").value.trim(),
      source_types: collectChipValues("sourceChips"),
      info_types: collectChipValues("typeChips"),
      domain_ids: getSelectedDomains(),
      tags: $("#tags").value.split(/[,，]/).map(t => t.trim()).filter(Boolean),
      comment: $("#comment").value.trim(),
      is_new_tech: $("#is_new_tech").value === "true",
      importance_score: Number($("#importance_score").value)
    };
  }

  function validateBase(form){
    if(!form.title) return "标题必填";
    if(!form.published_at) return "发布时间必填";
    if(!form.content) return "正文必填";
    if(!form.source_url) return "来源链接必填";
    if(form.source_types.length === 0) return "至少选择一个来源";
    if(form.info_types.length === 0) return "至少选择一个情报类型";
    if(form.domain_ids.length === 0) return "至少选择一个领域";
    return "";
  }

  function renderIndicators(){
    const tbody = $("#indicatorBody");
    tbody.innerHTML = "";
    if(state.indicators.length === 0){
      const tr = document.createElement("tr");
      tr.innerHTML = `<td colspan="4" class="muted">暂无候选指标，可手动新增</td>`;
      tbody.appendChild(tr);
      return;
    }
    state.indicators.forEach((ind, idx) => {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td>${escapeHtml(ind.name)}</td>
        <td><input data-idx="${idx}" data-field="value" value="${ind.value}" /></td>
        <td><input data-idx="${idx}" data-field="unit" value="${ind.unit}" /></td>
        <td><input data-idx="${idx}" data-field="keep" type="checkbox" ${ind.keep ? "checked" : ""} /></td>
      `;
      tbody.appendChild(tr);
    });

    tbody.querySelectorAll("input").forEach(input => {
      input.addEventListener("input", (e) => {
        const idx = Number(e.target.dataset.idx);
        const field = e.target.dataset.field;
        if(field === "keep"){
          state.indicators[idx].keep = e.target.checked;
        } else if(field === "value"){
          state.indicators[idx].value = e.target.value;
        } else if(field === "unit"){
          state.indicators[idx].unit = e.target.value;
        }
      });
    });
  }

  function updateAlertDisplay(){
    const shouldAlert = state.aiShouldAlert || state.manualAlert;
    $("#aiAlertText").textContent = shouldAlert ? "AI 建议预警：是" : "AI 建议预警：否";
    $("#aiAlertReason").textContent = state.aiReasons.join("、") || "-";
  }

  function runAiSuggestion(form){
    const content = `${form.title} ${form.content}`.toLowerCase();
    const indicators = [];
    if(content.includes("能耗") || content.includes("能量")){
      indicators.push({ name: "再生能耗", value: "2.5", unit: "GJ/tCO2", keep: true });
    }
    if(content.includes("容量") || content.includes("吸附")){
      indicators.push({ name: "工作容量", value: "2.0", unit: "mmol_CO2/g", keep: true });
    }
    if(indicators.length === 0){
      indicators.push({ name: "示例指标", value: "" , unit: "", keep: true });
    }

    state.indicators = indicators;
    state.aiShouldAlert = form.is_new_tech || form.importance_score >= 4;
    state.aiReasons = [];
    if(form.is_new_tech) state.aiReasons.push("新技术");
    if(form.importance_score >= 4) state.aiReasons.push("重要度较高");
    state.manualAlert = false;
    updateAlertDisplay();
    renderIndicators();
  }

  function alertRequired(){
    return state.aiShouldAlert || state.manualAlert;
  }

  function validateAlert(){
    if(!alertRequired()) return "";
    if(!$("#alert_title").value.trim()) return "预警标题必填";
    if(!$("#alert_body").value.trim()) return "预警内容必填";
    if(!$("#reviewer_comment").value.trim()) return "reviewer_comment 必填";
    return "";
  }

  function saveDraft(){
    const form = getForm();
    const now = new Date().toISOString();
    const list = JSON.parse(localStorage.getItem(draftKey) || "[]");
    list.unshift({ id: `DRAFT_${Date.now()}`, ...form, created_at: now, status: "draft" });
    localStorage.setItem(draftKey, JSON.stringify(list));
  }

  function showPreview(){
    const form = getForm();
    const indicators = state.indicators.filter(i => i.keep);
    const alertOn = alertRequired();
    const preview = `
      <div style="font-weight:700; font-size:18px;">${escapeHtml(form.title || "-")}</div>
      <div class="muted small" style="margin-top:6px;">发布时间：${form.published_at} / 重要度：${form.importance_score}</div>
      <div style="margin-top:10px; white-space:pre-wrap;">${escapeHtml(form.content || "-")}</div>
      <div style="margin-top:10px;">领域：${form.domain_ids.join("、") || "-"}</div>
      <div style="margin-top:10px;">comment：${escapeHtml(form.comment || "-")}</div>
      <div style="margin-top:10px;">指标：${indicators.map(i => `${i.name} ${i.value}${i.unit}`).join("；") || "-"}</div>
      <div style="margin-top:10px;">预警：${alertOn ? "是" : "否"}</div>
    `;
    $("#previewBody").innerHTML = preview;
    $("#previewModal").style.display = "flex";
  }

  $("#btnClosePreview").addEventListener("click", () => {
    $("#previewModal").style.display = "none";
  });

  $("#btnSaveDraft").addEventListener("click", () => {
    clearWarn();
    const form = getForm();
    const error = validateBase(form);
    if(error){
      showWarn(error);
      return;
    }
    saveDraft();
    alert("草稿已保存到本地");
  });

  $("#btnSubmit").addEventListener("click", () => {
    clearWarn();
    const form = getForm();
    const error = validateBase(form);
    if(error){
      showWarn(error);
      return;
    }
    runAiSuggestion(form);
    $("#aiPanel").style.display = "block";
    window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
  });

  $("#btnAddIndicator").addEventListener("click", () => {
    state.indicators.push({ name: "新指标", value: "", unit: "", keep: true });
    renderIndicators();
  });

  $("#btnToggleAlert").addEventListener("click", () => {
    state.manualAlert = !state.manualAlert;
    updateAlertDisplay();
  });

  $("#btnPreview").addEventListener("click", () => {
    clearWarn();
    const form = getForm();
    const error = validateBase(form) || validateAlert();
    if(error){
      showWarn(error);
      return;
    }
    showPreview();
  });

  $("#btnPublish").addEventListener("click", () => {
    clearWarn();
    const form = getForm();
    const error = validateBase(form) || validateAlert();
    if(error){
      showWarn(error);
      return;
    }
    alert("发布成功（样机：仅演示流程）");
  });

  async function main(){
    const [domains] = await Promise.all([
      loadJson("./data/domains.json")
    ]);

    state.domains = domains;

    createChips("sourceChips", ["产业新闻", "学术文献", "报告发布", "政策", "企业公告"]);
    createChips("typeChips", ["技术", "市场", "政策", "项目", "投融资"]);
    buildTree(domains || [], $("#domainTree"));

    const today = new Date();
    $("#published_at").value = today.toISOString().slice(0,10);

    const draftPayload = localStorage.getItem("currentDraft");
    if(draftPayload){
      const draft = JSON.parse(draftPayload);
      localStorage.removeItem("currentDraft");
      $("#title").value = draft.title || "";
      $("#published_at").value = draft.published_at || $("#published_at").value;
      $("#content").value = draft.content || "";
      $("#source_url").value = draft.source_url || "";
      $("#tags").value = (draft.tags || []).join(", ");
      $("#comment").value = draft.comment || "";
      $("#is_new_tech").value = String(draft.is_new_tech ?? true);
      $("#importance_score").value = String(draft.importance_score || 4);
      document.querySelectorAll("#sourceChips .chip").forEach(ch => {
        if((draft.source_types || []).includes(ch.dataset.value)) ch.classList.add("on");
      });
      document.querySelectorAll("#typeChips .chip").forEach(ch => {
        if((draft.info_types || []).includes(ch.dataset.value)) ch.classList.add("on");
      });
      document.querySelectorAll("#domainTree input[type='checkbox']").forEach(cb => {
        if((draft.domain_ids || []).includes(cb.value)) cb.checked = true;
      });
    }
  }

  main().catch(err => {
    console.error(err);
    showWarn("加载失败：" + err.message);
  });
</script>
</body>
</html>
